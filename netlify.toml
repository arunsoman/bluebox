[build]
  # The frontend directory contains the React app
  base = "frontend"
  # Build command runs inside the frontend directory
  command = "npm run build"
  # The directory where the built files are output
  publish = "dist"

# SPA routing — redirect all routes to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy — redirect /api calls to the backend server
# Update the target URL to your deployed backend URL
[[redirects]]
  from = "/api/*"
  to = "https://your-backend-url.com/api/:splat"
  status = 200

# WebSocket proxy — redirect /ws calls to the backend WebSocket endpoint
[[redirects]]
  from = "/ws/*"
  to = "wss://your-backend-url.com/ws/:splat"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self' wss: https:;"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
