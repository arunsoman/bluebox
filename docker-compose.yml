version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://protobox:protobox@postgres:5432/protobox
      - TIMESCALE_URL=postgresql+asyncpg://protobox:protobox@timescale:5432/protobox_audit
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=protobox-checkpoints
      - SECRET_KEY=change-me-in-production
      - LOG_LEVEL=INFO
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEFAULT_LLM_PROVIDER=ollama
      - DEFAULT_LLM_MODEL=llama3.1:8b
    depends_on:
      - postgres
      - timescale
      - redis
      - minio
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --log-level info

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: protobox
      POSTGRES_USER: protobox
      POSTGRES_PASSWORD: protobox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protobox -d protobox"]
      interval: 5s
      timeout: 5s
      retries: 5

  timescale:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: protobox_audit
      POSTGRES_USER: protobox
      POSTGRES_PASSWORD: protobox
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protobox -d protobox_audit"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: Ollama for local LLM
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU support - uncomment if NVIDIA GPU available
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  postgres_data:
  timescale_data:
  redis_data:
  minio_data:
  ollama_data:
