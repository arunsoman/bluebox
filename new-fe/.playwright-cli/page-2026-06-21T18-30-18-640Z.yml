                - list [ref=e128]:
                  - listitem [ref=e129]:
                    - generic [ref=e130]:
                      - text: "Difficulty strategy is described in both Core Functionality (Section 3.2: 'EASY (random legal move)', 'MEDIUM (blocks an immediate opponent win, otherwise random)', 'HARD (unbeatable - minimax algorithm)') and repeated in Use Case UC-2 ('picks difficulty (Easy/Medium/Hard)'). While consistent, this creates dual maintenance points if difficulty names or behavior change. More critically, Core Functionality says 'selectable' difficulty but does not enumerate the selection mechanism, while UC-2 assumes a UI pick without specifying it as a configuration step in the capability."
                      - button "Discuss in chat" [ref=e131] [cursor=pointer]
                  - listitem [ref=e132]:
                    - generic [ref=e133]:
                      - text: Score Tracking (C4) specifies 'Increment win/loss/draw counters tied to the current session after each completed game,' but UC-5 (Reset/abandon) states that an abandoned game 'is marked abandoned (not counted in score)'. However, Core Functionality (Section 3.5) claims the scoreboard 'survives a page refresh' but does not specify whether abandoned games in progress survive the refresh. The Use Case flow says 'page refresh mid-game restores the current board' but the Core Functionality says 'server is authoritative on whose turn it is' - both combined with the abandonment rule create ambiguity about whether a mid-game refresh is treated as abandon or resume.
