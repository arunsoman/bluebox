                    - generic [ref=e87]:
                      - text: NFRs —
                      - generic [ref=e88]: "Explicit NFR section (Section 11) lacks sub-categories: no Security subsection, no explicit Scalability/Availability targets, no Data Retention policy. 'Success Metrics' (Section 9) contains performance targets (200ms API response) and reliability targets (100% detection, minimax correctness) that are functionally NFRs but are not in the NFRs section. Accessibility is mentioned but without WCAG level. No mention of logging, monitoring, or error handling standards."
                      - button "Add detail" [ref=e89] [cursor=pointer]
                  - listitem [ref=e90]:
                    - generic [ref=e91]:
                      - text: Data Model —
                      - generic [ref=e92]: Section 10 mentions H2 as the persistence layer for 'sessions, games, moves, and score tallies' but does not provide a schema, entity-relationship diagram, or field definitions. There is no explicit Data Model section. Mentioned entities (Game, Move, Session, Score) are undefined.
                      - button "Add detail" [ref=e93] [cursor=pointer]
                    - generic [ref=e94]: "**Session** — persistent per-browser-session identity with no login. Stores an auto-generated opaque session token, an optional display name, and timestamps for lifecycle tracking. A session owns many `Game` and `Score` records. Constraints: `id` is the primary key (UUID or auto-increment). `display_name` allows null/empty; `last_active_at` updates on every API call to prevent stale sessions from accumulating orphaned data. Relationship: `1:N` with `Game`, `1:N` with `Score` (with mode/difficulty breakdown). <br><br>**Game** — a single game instance in either `PvP` or `PvC` mode. Tracks board state, turn order, outcome, and metadata. Columns: `id` (PK), `session_id` (FK → Session, indexed), `mode` (`PvP` or `PvC`), `difficulty` (`EASY`, `MEDIUM`, `HARD`, or null for PvP), `status` (`IN_PROGRESS`, `WON`, `DRAW`, `ABANDONED`), `board_state` (serialized 3x3 representation, e.g. a length-9 character array or JSON string of `X`, `O`, `_`), `current_player` (`X` or `O`), `winner` (`X`, `O`, or null), `starting_player` (`X` or `O`), `move_count` (int, 0-9), `created_at`, `ended_at`. Constraints: `difficulty` must be non-null only when `mode` = `PvC`. `winner` and `ended_at` are populated only when `status` transitions to `WON`, `DRAW`, or `ABANDONED`. `board_state` must always contain exactly 9 characters/elements. <br><br>**Move** — an atomic turn taken within a `Game`. Immutable once recorded. Columns: `id` (PK), `game_id` (FK → Game, indexed), `player_mark` (`X` or `O`), `cell_row` (0, 1, or 2), `cell_column` (0, 1, or 2), `move_number` (positive int, starting at 1 per game), `timestamp`. Constraints: composite unique constraint on (`game_id`, `move_number`) enforces sequential turn order. `cell_row` and `cell_column` each must be between 0 and 2, inclusive. A unique constraint on (`game_id`, `cell_row`, `cell_column`) prevents duplicate occupation. `move_number` 1 is always `X`; odd numbers are `X`, even numbers are `O`. The move’s `player_mark` must match `Game.current_player` at the time of insertion. <br><br>**Score** — per-session aggregated tallies, split by mode/difficulty combination so a player can track separate records for PvP, PvC-Easy, PvC-Medium, and PvC-Hard. Columns: `id` (PK), `session_id` (FK → Session, indexed), `wins` (int, ≥ 0), `losses` (int, ≥ 0), `draws` (int, ≥ 0), `mode`, `difficulty`. Constraints: composite unique constraint on (`session_id`, `mode`, `difficulty`) (difficulty omitted or set to a sentinel where `mode` = `PvP`). `wins`, `losses`, and `draws` are non-negative. Totals increment only upon game completion, never on abandon. <br><br>**Relationship Summary**: A `Session` has many `Game` records (active and completed). Each `Game` has many `Move` records, ordered by `move_number`. A `Session` has many `Score` records, one per (`mode`, `difficulty`) pair. The `Match History` feature (C5/UC-4) is served by querying `Game` (filter by `session_id`, `status` in (`WON`, `DRAW`), order by `created_at` DESC, paginated), joined to its `Move` count (or the stored `move_count` denormalized on `Game`)."
